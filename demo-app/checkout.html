<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout — ShopNest</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="index.html" class="logo">Shop<span>Nest</span></a>
        <nav class="nav-main">
          <a href="index.html">Home</a>
          <a href="products.html">Catalog</a>
          <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        </nav>
        <div class="header-actions" id="auth-slot"></div>
      </div>
    </header>
    <main>
      <div class="steps">
        <span class="on">1. Cart</span>
        <span class="on">2. Details</span>
        <span>3. Payment</span>
        <span>4. Confirmation</span>
      </div>
      <h1 style="margin-top: 0">Shipping details</h1>
      <div id="checkout-empty" class="empty-state hidden">
        <p>Your cart is empty. Add something nice first.</p>
        <a class="btn btn-primary" href="products.html">Go to catalog</a>
      </div>
      <div id="checkout-form-block" class="hidden">
        <div class="form-panel" style="max-width: 520px; margin: 0">
          <p class="sub">We will use this address on the order confirmation (demo only).</p>
          <form id="checkout-form" novalidate>
            <div class="field">
              <label for="addr-full">Street address</label>
              <input id="addr-full" type="text" required placeholder="123 Main Street" />
            </div>
            <div class="field">
              <label for="addr-line2">Apt, suite (optional)</label>
              <input id="addr-line2" type="text" placeholder="Unit 4B" />
            </div>
            <div class="field">
              <label for="addr-city">City</label>
              <input id="addr-city" type="text" required />
            </div>
            <div class="field">
              <label for="addr-zip">Postal code</label>
              <input id="addr-zip" type="text" required />
            </div>
            <button type="submit" class="btn btn-primary btn-block">Continue to payment</button>
          </form>
        </div>
      </div>
    </main>
    <footer class="site-footer">
      <div class="footer-inner">
        <div><strong>ShopNest</strong><br />Demo QA build</div>
        <div>Help<br /><a href="#">FAQs</a></div>
        <div>Legal<br /><a href="#">Privacy</a></div>
      </div>
    </footer>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/checkout.js"></script>
  </body>
</html>
