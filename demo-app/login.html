<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in — ShopNest</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="index.html" class="logo">Shop<span>Nest</span></a>
        <nav class="nav-main">
          <a href="index.html">Home</a>
          <a href="products.html">Catalog</a>
          <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        </nav>
        <div class="header-actions" id="auth-slot"></div>
      </div>
    </header>
    <main>
      <div class="form-panel">
        <h1>Welcome back</h1>
        <p class="sub">Log in to continue checkout and view your cart on this device.</p>
        <div id="login-error" class="alert alert-error hidden" role="alert"></div>
        <form id="login-form" novalidate>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn btn-primary btn-block">Log in</button>
        </form>
        <p style="margin-top: 1.25rem; font-size: 0.9rem; color: var(--muted)">
          New here? <a href="register.html">Create an account</a>
        </p>
      </div>
    </main>
    <footer class="site-footer">
      <div class="footer-inner">
        <div><strong>ShopNest</strong><br />Demo QA build</div>
        <div>Help<br /><a href="#">FAQs</a></div>
        <div>Legal<br /><a href="#">Privacy</a></div>
      </div>
    </footer>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
