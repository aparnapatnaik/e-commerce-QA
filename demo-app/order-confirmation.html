<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order confirmed — ShopNest</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="index.html" class="logo">Shop<span>Nest</span></a>
        <nav class="nav-main">
          <a href="index.html">Home</a>
          <a href="products.html">Catalog</a>
          <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        </nav>
        <div class="header-actions" id="auth-slot"></div>
      </div>
    </header>
    <main>
      <div class="steps">
        <span class="on">1. Cart</span>
        <span class="on">2. Details</span>
        <span class="on">3. Payment</span>
        <span class="on">4. Confirmation</span>
      </div>
      <div class="form-panel" style="max-width: 560px; margin: 0">
        <div class="alert alert-success" role="status">Thank you — your demo order is confirmed.</div>
        <h1 style="margin-top: 0.5rem">Order details</h1>
        <p class="sub" id="order-id-line"></p>
        <div id="order-lines" class="table-wrap" style="margin-top: 1rem"></div>
        <p style="margin-top: 1.25rem">
          <a class="btn btn-secondary" href="products.html">Keep shopping</a>
        </p>
      </div>
    </main>
    <footer class="site-footer">
      <div class="footer-inner">
        <div><strong>ShopNest</strong><br />Demo QA build</div>
        <div>Help<br /><a href="#">FAQs</a></div>
        <div>Legal<br /><a href="#">Privacy</a></div>
      </div>
    </footer>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const raw = localStorage.getItem(window.ShopNest.STORAGE_ORDER);
        const order = raw ? JSON.parse(raw) : null;
        const params = new URLSearchParams(window.location.search);
        const idParam = params.get("id");
        if (!order || (idParam && order.id !== idParam)) {
          document.querySelector("main .form-panel").innerHTML =
            '<p class="sub">No order found in this browser session.</p><a href="index.html">Back home</a>';
          return;
        }
        document.getElementById("order-id-line").textContent = "Order ID: " + order.id;
        const lines = document.getElementById("order-lines");
        let rows =
          "<table><thead><tr><th>Item</th><th>Qty</th><th>Price</th></tr></thead><tbody>";
        (order.items || []).forEach((r) => {
          rows +=
            "<tr><td>" +
            r.name +
            "</td><td>" +
            r.qty +
            "</td><td>$" +
            r.price.toFixed(2) +
            "</td></tr>";
        });
        rows +=
          "</tbody></table><p style='padding:1rem'><strong>Ship to:</strong> " +
          (order.address && order.address.full ? order.address.full : "—") +
          ", " +
          (order.address && order.address.city ? order.address.city : "") +
          " " +
          (order.address && order.address.zip ? order.address.zip : "") +
          "</p>";
        lines.innerHTML = rows;
      });
    </script>
  </body>
</html>
